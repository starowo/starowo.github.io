<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Murderia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <div id="crime-scene-main" class="crime-scene-container active">
            <div class="crime-scene">
                
                <div class="switch-scene">←</div>
                <img src="crime-scene.png" alt="Crime Scene" id="crime-scene-image">
                <div class="evidence" data-info="blood1" style="top: 76%; left: 5%; width: 10%; height: 5%;">
                    <img src="blood1.png" alt="Evidence 1">
                </div>
                <div class="evidence" data-info="poster" style="top: 60%; left: 27%; width: 10%; height: 10%;">
                    <img src="poster.png" alt="Evidence 2">
                </div>
                <div class="evidence" data-info="epipen" style="top: 55%; left: 65%; width: 10%;">
                    <img src="epipen.png" alt="Evidence 3">
                </div>
            </div>
        </div>
        <div id="crime-scene-backarea" class="crime-scene-container">
            <div class="crime-scene">
                <div class="switch-scene2">↓</div>
                <img src="backarea.png" alt="Crime Scene" id="crime-scene-back-image">
                
                <div class="evidence" data-info="entry" style="top: 19%; left: 5%; width: 20%;">
                    <img src="entry.png" alt="Door">
                </div>
                <div class="evidence" data-info="fabric" style="top: 42%; left: 4%; width: 5%;">
                    <img src="fabric.png" alt="Strings">
                </div>
                <div class="evidence" data-info="bottle" style="top: 70%; left: 5%; width: 15%;">
                    <img src="bleach.png" alt="Bottle">
                </div>
                <div class="evidence" data-info="blood2" style="top: 15%; left: 60%; width: 20%;">
                    <img src="blood2.png" alt="Blood Spatter">
                </div>
                <div class="evidence" data-info="blood3" style="top: 72%; left: 50%; width: 30%;">
                    <img src="blood3.png" alt="Blood Smear">
                </div>
            </div>
        </div>
        <div id="suspects">
            <div class="suspect" data-info="Xinghe">
                <img src="xinghe.jpg" alt="Suspect 1">
            </div>
            <div class="suspect" data-info="Karina">
                <img src="karina.webp" alt="Suspect 2">
            </div>
            <div class="suspect" data-info="Fernando">
                <img src="fernando.webp" alt="Suspect 3">
            </div>
            <div class="suspect" data-info="Taylor">
                <img src="taylor.webp" alt="Suspect 4">
            </div>
            <div class="suspect" data-info="Info">
                <img src="info.png" alt="Suspect 5">
            </div>
        </div>
        <div id="suspect-info">
            <div id="suspect-info-content">
                <h2 id="popup-title"></h2>
                <label class="type"></label>
                <hr>
                <p class="popup-text"></p>
                <hr>
                <p class="popup-additional"></p>
            </div>
        </div>
    </div>

    <div id="popup">
        <span class="close-btn">X</span>
        <div id="popup-content">
            <h2 id="popup-title"></h2>
            <label class="type"></label>
            <label class="classify">Biological</label>
            <br>
            <hr>
            <p class="popup-text">"Evidence 1 Information"</p>
            <hr>
            <p class="popup-additional">Additional Info</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
