<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Star's Homepage</title>
    <link href="./style.css" type="text/css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./script.js"></script>
</head>

<body>
    <div id="characters">
        <div class="character">
            <p id="sc">Scout</p>
            <p id="scn">Name</p>
            <p id="sc1">ATK: 40 Range: 3</p>
            <p id="sc2">DEF: 0 100/100</p>
        </div>
        <div class="character">
            <p id="so1">Soldier</p>
            <p id="so1n">Name</p>
            <p id="so11">ATK: 40 Range: 3</p>
            <p id="so12">DEF: 0 100/100</p>
        </div>
        <div class="character">
            <p id="so2">Soldier</p>
            <p id="so2n">Name</p>
            <p id="so21">ATK: 40 Range: 3</p>
            <p id="so22">DEF: 0 100/100</p>
        </div>
        <div class="character">
            <p id="su">Surgeon</p>
            <p id="sun">Name</p>
            <p id="su1">ATK: 40 Range: 3</p>
            <p id="su2">DEF: 0 100/100</p>
        </div>
    </div>

    <div id="game-text">
        <!-- Game text and options go here -->
        <div id="content"></div>
        <div id="options">
            <button id="o0">Option1</button>
            <button id="o1">Option2</button>
            <button id="o2">Option3</button>
            <button id="o3">Option4</button>
        </div>
    </div>

</body>

</html>
